<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Khách hàng - MOSHII</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/pages/khachHang-chiTiet.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="app-container">
        <div id="sidebar-placeholder"></div>
        <div class="main-wrapper">
            <div id="header-placeholder"></div>
            <main class="main-content">
                
                <div class="detail-header-action">
                    <div class="detail-header-left">
                        <a href="khachHang.html" class="back-link" style="display: flex; align-items: center; gap: 8px; color: #6B7280; text-decoration: none; font-size: 14px; font-weight: 500;">
                            <i class='bx bx-chevron-left'></i> Quay lại
                        </a>
                        <h2 id="pageTitle">Khách hàng / ...</h2>
                    </div>
                    <div class="detail-header-right">
                        <button class="btn-edit"><i class='bx bx-edit-alt'></i> Sửa</button>
                        <!-- Nút Xóa (Đã gỡ bỏ onclick, JS sẽ tự động bắt sự kiện qua class) -->
                        <button class="btn-delete"><i class='bx bx-trash'></i> Xóa</button>
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-section">
                        <h3>Thông báo chung</h3>
                        <div id="general-info-rows"></div>
                    </div>
                    <div class="info-section">
                        <h3>Thông tin quản lý</h3>
                        <div id="management-info-rows"></div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- ===================================== -->
    <!-- MODAL 1: XÁC NHẬN XÓA (ĐỎ) -->
    <!-- ===================================== -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon-danger">
                <i class='bx bx-x'></i>
            </div>
            <h3>Xác nhận</h3>
            <p>Bạn chắc chắn muốn xóa khách hàng này không?</p>
            <div class="modal-actions">
                <button class="btn-danger-confirm" id="btnConfirmDelete">Xóa</button>
                <button class="btn-cancel-modal" id="btnCancelDelete">Đóng</button>
            </div>
        </div>
    </div>

    <!-- ===================================== -->
    <!-- MODAL 2: THÔNG BÁO XÓA THÀNH CÔNG (XANH) -->
    <!-- ===================================== -->
    <div id="successDeleteModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon-success">
                <i class='bx bx-check'></i>
            </div>
            <h3>Thông báo</h3>
            <p>Xóa khách hàng thành công</p>
            <button class="btn-primary-modal" id="btnCloseSuccess">Đóng</button>
        </div>
    </div>

    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/khachHang-chiTiet.js"></script>
</body>
</html>

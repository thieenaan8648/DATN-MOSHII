<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa Hóa đơn - MOSHII</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <!-- Tái sử dụng CSS của màn hình tạo form -->
    <link rel="stylesheet" href="../assets/css/pages/goiCuoc-moi.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* Tinh chỉnh thêm cho dropdown select và input date để đồng bộ chiều cao, viền */
        select.form-input, input[type="date"].form-input {
            width: 100%; height: 44px; padding: 0 16px; background: #fff; 
            border: 1.33px solid #D1D5DB; border-radius: 10px; 
            font-size: 14px; color: #111827; outline: none;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        select.form-input {
            appearance: none; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="sidebar-placeholder"></div>
        <div class="main-wrapper">
            <div id="header-placeholder"></div>
            <main class="main-content">
                
                <!-- HEADER -->
                <div class="page-header-action">
                    <div class="header-left-stack">
                        <a href="hoaDon-chiTiet.html" class="back-link">
                            <i class='bx bx-chevron-left'></i> Quay lại
                        </a>
                        <h2 id="pageTitle">Chỉnh sửa hóa đơn</h2>
                    </div>
                </div>

                <div class="create-form-container">
                    <div class="form-grid">
                        
                        <!-- Dòng 1: Khách hàng & Tên gói cước (Bị khóa) -->
                        <div class="input-group">
                            <div class="form-label">Khách hàng</div>
                            <input type="text" id="edit-customer" value="Trần Văn Hùng" disabled style="background: #F3F4F6; cursor: not-allowed;">
                        </div>
                        <div class="input-group">
                            <div class="form-label">Tên gói cước</div>
                            <input type="text" id="edit-packageName" value="Gói Combo Data + Voice" disabled style="background: #F3F4F6; cursor: not-allowed;">
                        </div>

                        <!-- Dòng 2: Giá & Trạng thái -->
                        <div class="input-group">
                            <div class="form-label">Giá gói cước</div>
                            <input type="text" id="edit-packagePrice" value="200000" class="val-required" style="background: #F3F4F6;">
                            <div class="error-text">Không được để trống</div>
                        </div>
                        <div class="input-group">
                            <div class="form-label">Trạng thái hóa đơn</div>
                            <select class="form-input" id="edit-status">
                                <option value="Hoàn tất">Hoàn tất</option>
                                <option value="Đang xử lý">Đang xử lý</option>
                                <option value="Đã hủy">Đã hủy</option>
                            </select>
                        </div>

                        <!-- Dòng 3: Ngày Bắt Đầu & Ngày Kết Thúc -->
                        <div class="input-group">
                            <div class="form-label">Ngày bắt đầu</div>
                            <input type="date" id="edit-startDate" class="form-input" value="2026-04-05">
                        </div>
                        <div class="input-group">
                            <div class="form-label">Ngày kết thúc</div>
                            <input type="date" id="edit-endDate" class="form-input" value="2026-05-05">
                        </div>

                        <!-- Dòng 4: Tổng tiền -->
                        <div class="input-group col-span-2">
                            <div class="form-label">Tổng số tiền</div>
                            <input type="text" id="edit-totalPrice" value="200000" class="val-required" style="background: #F3F4F6;">
                            <div class="error-text">Không được để trống</div>
                        </div>

                        <!-- NÚT THAO TÁC Ở CUỐI FORM -->
                        <div class="form-actions col-span-2">
                            <button class="btn-cancel-form" onclick="window.location.href='hoaDon-chiTiet.html'">Hủy</button>
                            <button class="btn-primary" id="btn-save-hoadon">Lưu</button>
                        </div>

                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- MODAL THÔNG BÁO CẬP NHẬT THÀNH CÔNG -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon-success">
                <i class='bx bx-check'></i>
            </div>
            <h3>Thông báo</h3>
            <p>Cập nhật hóa đơn thành công</p>
            <button class="btn-primary-modal" onclick="dongModal()">Đóng</button>
        </div>
    </div>

    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/hoaDon-sua.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết Tài khoản - MOSHII</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/pages/taiKhoan-chiTiet.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="app-container">
        <div id="sidebar-placeholder"></div>
        <div class="main-wrapper">
            <div id="header-placeholder"></div>
            <main class="main-content">
                
                <div class="detail-header-action">
                    <div class="detail-header-left">
                        <a href="taiKhoan.html" class="back-link" style="display: flex; align-items: center; gap: 8px; color: #6B7280; text-decoration: none; font-size: 14px; font-weight: 500;">
                            <i class='bx bx-chevron-left'></i> Quay lại
                        </a>
                        <h2 id="pageTitle">Tài khoản / ...</h2>
                    </div>
                    <div class="detail-header-right">
                        <button class="btn-edit" id="btnEditAcc"><i class='bx bx-edit-alt'></i> Sửa</button>
                        <button class="btn-disable" onclick="hienModalXacNhan()"><i class='bx bx-block'></i> Vô hiệu hóa</button>
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-section">
                        <h3>Thông báo chung</h3>
                        <div class="info-row">
                            <div class="info-label">Loại tài khoản / vai trò</div>
                            <div class="info-value" id="val-role"></div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Email</div>
                            <div class="info-value" id="val-email"></div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Mật khẩu</div>
                            <div class="info-value">••••••••</div>
                        </div>
                    </div>

                    <div class="info-section">
                        <h3 id="sectionTitle2">Thông tin ...</h3>
                        <div id="dynamic-info-rows">
                            <!-- JS sẽ đổ dữ liệu vào đây -->
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- MODAL 1: XÁC NHẬN VÔ HIỆU HÓA -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon-danger">
                <i class='bx bx-x'></i>
            </div>
            <h3>Xác nhận</h3>
            <p>Bạn có muốn vô hiệu hóa tài khoản này không?</p>
            <div class="modal-actions">
                <button class="btn-danger-confirm" onclick="voHieuHoa()">Có</button>
                <button class="btn-cancel-modal" onclick="anModalXacNhan()">Không</button>
            </div>
        </div>
    </div>

    <!-- MODAL 2: THÔNG BÁO THÀNH CÔNG -->
    <div id="successDeactivateModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon-success">
                <i class='bx bx-check'></i>
            </div>
            <h3>Thông báo</h3>
            <p>Vô hiệu hóa tài khoản thành công</p>
            <button class="btn-primary-modal" onclick="dongModalThanhCong()">Đóng</button>
        </div>
    </div>

    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/taiKhoan-chiTiet.js"></script>
    
    <!-- Script Logic Modal -->
    <script>
        // Mở Modal Xác Nhận
        function hienModalXacNhan() {
            document.getElementById('confirmModal').style.display = 'flex';
        }

        // Đóng Modal Xác Nhận (nếu chọn Không)
        function anModalXacNhan() {
            document.getElementById('confirmModal').style.display = 'none';
        }

        // Nếu chọn CÓ -> Tắt Modal 1, Mở Modal 2
        function voHieuHoa() {
            anModalXacNhan();
            document.getElementById('successDeactivateModal').style.display = 'flex';
        }

        // Khi bấm ĐÓNG ở Modal 2
        function dongModalThanhCong() {
            document.getElementById('successDeactivateModal').style.display = 'none'; // Tắt Modal 2
            
            // Cập nhật giao diện: Đổi thẻ trạng thái thành màu đỏ "Ngừng hoạt động"
            const statusContainer = document.getElementById('status-container');
            if(statusContainer) {
                statusContainer.innerHTML = `
                    <span style="background: #FEE2E2; color: #DC2626; padding: 4px 10px; border-radius: 8px; font-weight: 500; font-size: 12px; display: inline-flex; align-items: center; gap: 6px;">
                        <span style="width: 6px; height: 6px; background: #DC2626; border-radius: 50%;"></span> Ngừng hoạt động
                    </span>
                `;
            }
        }
    </script>
</body>
</html>

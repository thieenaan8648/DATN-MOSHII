<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đại lý / CTV - MOSHII</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/pages/daiLy-CTV.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="app-container">
        <div id="sidebar-placeholder"></div>

        <div class="main-wrapper">
            <div id="header-placeholder"></div>

            <main class="main-content">
                <div class="page-title-row">
                    <h2>Quản lý Đại lý / Cộng tác viên</h2>
                </div>

                <div class="tabs-header">
                    <div class="tab-item active">Đại lý</div>
                    <div class="tab-item">Cộng tác viên</div>
                </div>

                <div class="search-action-row">
                    <div class="search-box-large">
                        <i class='bx bx-search'></i>
                        <input type="text" placeholder="Tìm kiếm theo tên, mã đại lý...">
                    </div>
                    <button class="btn-search">Tìm kiếm</button>
                </div>

                <div class="dashboard-section" style="padding: 0;">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>MÃ ĐẠI LÝ</th>
                                    <th>TÊN ĐẠI DIỆN</th>
                                    <th>SỐ ĐIỆN THOẠI</th>
                                    <th>KHU VỰC</th>
                                    <th>HOA HỒNG (%)</th>
                                    <th>TRẠNG THÁI</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong style="color: #111827; font-weight: 500;">DL001</strong></td>
                                    <td><span style="color: #374151;">Trần Thị Bình</span></td>
                                    <td><span style="color: #374151;">0912345678</span></td>
                                    <td><span style="color: #6B7280;">TP. Hồ Chí Minh</span></td>
                                    <td><span style="color: #374151;">15%</span></td>
                                    <td><span class="status-dot status-active">Hoạt động</span></td>
                                </tr>
                                <tr>
                                    <td><strong style="color: #111827; font-weight: 500;">DL002</strong></td>
                                    <td><span style="color: #374151;">Phạm Thị Dung</span></td>
                                    <td><span style="color: #374151;">0934567890</span></td>
                                    <td><span style="color: #6B7280;">Hà Nội</span></td>
                                    <td><span style="color: #374151;">12%</span></td>
                                    <td><span class="status-dot status-active">Hoạt động</span></td>
                                </tr>
                                <tr>
                                    <td><strong style="color: #111827; font-weight: 500;">DL003</strong></td>
                                    <td><span style="color: #374151;">Nguyễn Văn Thành</span></td>
                                    <td><span style="color: #374151;">0945678901</span></td>
                                    <td><span style="color: #6B7280;">Đà Nẵng</span></td>
                                    <td><span style="color: #374151;">10%</span></td>
                                    <td><span class="status-dot status-inactive">Ngừng hoạt động</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../assets/js/include.js"></script>
</body>
</html>

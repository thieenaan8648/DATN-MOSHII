<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/pages/dangNhap.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="login-page">

    <!-- LEFT -->
    <div class="login-left">
      <div class="decor">
        <div class="dot" style="top:40px; left:160px;"></div>
        <div class="dot" style="top:570px; left:520px;"></div>
        <div class="dot" style="top:520px; left:480px;"></div>
      </div>

      <img src="../assets/images/robot.png" class="robot">
    </div>

    <!-- RIGHT -->
    <div class="login-right">

      <div class="login-card">

        <div class="logo">MOSHII</div>

        <div class="form">

          <!-- EMAIL -->
          <div class="form-group">
            <label>Email</label>
            <input id="email" type="text" placeholder="Nhập email">
            <div class="error" id="emailError">Không được để trống</div>
          </div>

          <!-- PASSWORD -->
          <div class="form-group">
            <label>Mật khẩu</label>

            <div class="password">
              <input id="password" type="password" placeholder="Nhập mật khẩu">
            </div>

            <div class="error" id="passwordError">Không được để trống</div>

            <div class="error" id="loginError">
              Thông tin đăng nhập không đúng. Vui lòng nhập lại!
            </div>
          </div>

          <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>

        </div>

      </div>

    </div>

  </div>

<script src="../assets/js/dangNhap.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo thống kê - MOSHII</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/pages/baoCao.css">
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="app-container">
        <div id="sidebar-placeholder"></div>

        <div class="main-wrapper">
            <div id="header-placeholder"></div>

            <main class="main-content">
                <div class="page-title-row">
                    <h2>Báo cáo thống kê đơn hàng</h2>
                </div>

                <div class="filter-section">
                    <h3>Bộ lọc báo cáo</h3>

                    <div class="filter-row-group">
                        <div class="filter-label">Đối tượng thống kê</div>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="doi_tuong" checked> Tất cả
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="doi_tuong"> Theo Đại lý
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="doi_tuong"> Theo Cộng tác viên
                            </label>
                        </div>
                    </div>

                    <div class="filter-row-group">
                        <div class="filter-label">Loại thời gian</div>
                        <div class="radio-group">
                            <label class="radio-item">
                                <input type="radio" name="loai_thoi_gian" checked> Theo ngày
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="loai_thoi_gian"> Theo tuần
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="loai_thoi_gian"> Theo tháng
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="loai_thoi_gian"> Theo năm
                            </label>
                        </div>
                    </div>

                    <div class="filter-row-group">
                        <div class="filter-label">Khoảng thời gian</div>
                        <div class="date-group">
                            <div class="date-input-wrapper">
                                <label>Từ ngày</label>
                                <input type="date">
                            </div>
                            <div class="date-input-wrapper">
                                <label>Đến ngày</label>
                                <input type="date">
                            </div>
                        </div>
                    </div>

                    <div class="action-row">
                        <button class="btn-primary">Xem báo cáo</button>
                        <button class="btn-outline">Xuất báo cáo</button>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="../assets/js/include.js"></script>
</body>
</html>
